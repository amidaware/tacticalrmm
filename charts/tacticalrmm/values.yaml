nats:
  # The NATS server at this URL MUST have auth callout enabled with:
  #   - An AUTH account containing an "auth-service" user whose password
  #     matches tactical-natsapi.authServicePassSecret above.
  #   - authorization.auth_callout.issuer set to the public key derived
  #     from the AUTH_ISSUER_SEED in the tactical-nats-auth secret.
  #   - An account matching tactical-natsapi.authTargetAccount where
  #     approved TRMM users (tacticalrmm superuser + agents) land.
  # See tacticalrmm/natsapi/DESIGN_LAYER3_AUTH_CALLOUT.md for the full
  # contract and the companion wrapper chart at
  # openframe-saas-tenant/manifests/integrated-tools/nats/ for an example.
  url:
