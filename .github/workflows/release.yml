name: TacticalRMM Release

# =============================================================================
# WORKFLOW CONFIGURATION
# =============================================================================

permissions:
  contents: write
  packages: write
  actions: write
  pull-requests: write
  attestations: write
  id-token: write

on:
  push:
    branches: [develop]
    paths:
      - 'api/**'
      - 'docker/**'
      - 'nats-listener/**'
      - 'charts/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to Release (e.g., v1.2.3)"
        required: true
        type: string

env:
  REGISTRY: "ghcr.io"
  ORGANISATION: ${{ github.repository_owner }}
  REPOSITORY: ${{ github.event.repository.name }}

# =============================================================================
# JOBS
# =============================================================================

jobs:
  changes:
    name: Detect Changes
    uses: ./.github/workflows/changes.yml
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'

  matrix:
    name: Generate Matrix
    uses: ./.github/workflows/matrix.yml
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'


  build:
    name: "Build: ${{ matrix.name }}"
    needs: [changes, matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.images_matrix) }}
    steps:
      - name: Check if build should run
        id: should_run
        run: echo "run=${{ github.event_name == 'workflow_dispatch' || fromJSON(toJSON(needs.changes.outputs))[matrix.name] == 'true' }}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        if: steps.should_run.outputs.run == 'true'
        with:
          fetch-depth: 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        if: steps.should_run.outputs.run == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: steps.should_run.outputs.run == 'true'
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: steps.should_run.outputs.run == 'true'

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        if: steps.should_run.outputs.run == 'true'
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.REPOSITORY }}/${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
          labels: |
            org.opencontainers.image.vendor=${{ env.ORGANISATION }}
            org.opencontainers.image.description=TacticalRMM - Remote Monitoring & Management
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@v6
        if: steps.should_run.outputs.run == 'true'
        with:
          context: ${{ matrix.context || matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Cleanup old container versions
        if: steps.docker_build.outcome == 'success'
        uses: dataaxiom/ghcr-cleanup-action@v1
        continue-on-error: true
        with:
          package: ${{ env.REPOSITORY }}/${{ matrix.name }}
          delete-ghost-images: true
          delete-tags: '.*'
          exclude-tags: '^(?:[0-9]+\.[0-9]+\.[0-9]+|latest|test-.*)$'
          use-regex: true


  build_helm:
    name: "Build Helm Chart"
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - name: Check if build should run
        id: should_run
        run: echo "run=${{ github.event_name == 'workflow_dispatch' || contains(needs.changes.outputs.helm, 'true') }}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        if: steps.should_run.outputs.run == 'true'

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
        if: steps.should_run.outputs.run == 'true'

      - name: Push Chart
        uses: appany/helm-oci-chart-releaser@v0.5.0
        if: steps.should_run.outputs.run == 'true'
        with:
          name: tacticalrmm
          repository: ${{ github.repository }}/helm-charts
          tag: ${{ inputs.version || '9.9.9' }}
          path: ./charts/tacticalrmm
          registry: ${{ env.REGISTRY }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}


  release:
    name: "Create Release"
    needs: [changes, matrix, build, build_helm]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.version != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release header
        run: |
          IMAGES=$(echo '${{ needs.matrix.outputs.images_matrix }}' | jq -r '.[] | "- `${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.REPOSITORY }}/\(.name):${{ inputs.version }}`"')

          cat > RELEASE_HEADER.md <<EOF
          ## Docker Images
          $IMAGES

          ## Helm Chart
          - \`oci://${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.REPOSITORY }}/tacticalrmm:${{ inputs.version }}\`
          ---
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "${{ inputs.version }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: RELEASE_HEADER.md
