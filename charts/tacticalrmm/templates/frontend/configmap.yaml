{{- if (index .Values "tactical-frontend").enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: tactical-frontend
data:
  TRMM_PROTO: "http"
  {{- if (index .Values "tactical-nginx").enabled }}
  API_LOCALHOST_HOST: "tactical-nginx.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.tactical.backend.port }}"
  {{- else }}
  API_LOCALHOST_HOST: "tactical-backend-0.tactical-backend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.tactical.backend.port }}"
  {{- end }}
  WS_PROTO: "ws"
{{- end }}
