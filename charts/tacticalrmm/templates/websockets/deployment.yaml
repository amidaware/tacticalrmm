{{- if .Values.tactical.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tactical-websockets
spec:
  replicas: 1
  revisionHistoryLimit: {{ .Values.tactical.websockets.revisionHistoryLimit }}

  selector:
    matchLabels:
      {{- include "tacticalrmm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tactical-websockets
  template:
    metadata:
      labels:
        {{- include "tacticalrmm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tactical-websockets

    spec:
      initContainers:
        - name: wait-for-dependencies
          image: "{{ .Values.tactical.initImage.registry }}/{{ .Values.tactical.initImage.repository }}:{{ .Values.tactical.initImage.tag }}"
          envFrom:
            {{- include "tacticalrmm.baseEnvFrom" . | nindent 12 }}
          command: ['sh', '-c', '
            echo "Waiting for PostgreSQL..." &&
            until nc -z $POSTGRES_HOST $POSTGRES_PORT; do sleep 2; done &&
            echo "PostgreSQL is ready!" &&
            echo "Waiting for Redis..." &&
            until nc -z $REDIS_HOST $REDIS_PORT; do sleep 2; done &&
            echo "Redis is ready!" &&
            echo "Waiting for Backend..." &&
            until nc -z tactical-backend-0.tactical-backend.{{ .Release.Namespace }}.svc.cluster.local 8000; do sleep 2; done &&
            echo "Backend is ready!"
            ']

      containers:
        - name: tactical-base
          image: "{{ .Values.tactical.image.registry }}/{{ .Values.tactical.image.repository }}:{{ .Values.tactical.image.tag }}"
          args: ["tactical-websockets"]
          ports:
            - containerPort: 8000
              name: http

          envFrom:
            {{- include "tacticalrmm.baseEnvFrom" . | nindent 12 }}
          env:
            {{- include "tacticalrmm.secretKeyEnv" . | nindent 12 }}

          resources:
            {{- toYaml .Values.tactical.websockets.resources | nindent 12 }}

          livenessProbe:
            exec:
              command:
                - cat
                - /opt/tactical/tmp/tactical/ready
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - cat
                - /opt/tactical/tmp/tactical/ready
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          volumeMounts:
            - name: websockets-data
              mountPath: /opt/tactical
      volumes:
        - name: websockets-data
          emptyDir: {}
{{- end }}
