{{- if .Values.tactical.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: tactical-websockets
spec:
  clusterIP: None
  selector:
    {{- include "tacticalrmm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tactical-websockets
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
{{- end }}
