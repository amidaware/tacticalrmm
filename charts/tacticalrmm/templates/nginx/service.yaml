{{- if (index .Values "tactical-nginx").enabled }}
apiVersion: v1
kind: Service
metadata:
  name: tactical-nginx
spec:
  selector:
    {{- include "tacticalrmm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tactical-nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: api
    port: 443
    targetPort: 443
    protocol: TCP
{{- end }}
