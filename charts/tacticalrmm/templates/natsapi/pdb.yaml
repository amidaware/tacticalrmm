{{- if and (index .Values "tactical-natsapi").enabled (index .Values "tactical-natsapi").pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tactical-natsapi
spec:
  # maxUnavailable (not minAvailable) so that if replicas is ever
  # overridden to 1, node drains aren't blocked forever — minAvailable: 1
  # with replicas: 1 makes the pod non-evictable. maxUnavailable: 1 caps
  # disruption at one pod at a time regardless of the replica count.
  maxUnavailable: {{ (index .Values "tactical-natsapi").pdb.maxUnavailable | default 1 }}
  selector:
    matchLabels:
      {{- include "tacticalrmm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tactical-natsapi
{{- end }}
