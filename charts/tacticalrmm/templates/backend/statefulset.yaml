{{- if .Values.tactical.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tactical-backend
spec:
  replicas: 1
  revisionHistoryLimit: {{ .Values.tactical.backend.revisionHistoryLimit }}

  serviceName: tactical-backend

  selector:
    matchLabels:
      {{- include "tacticalrmm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tactical-backend
  template:
    metadata:
      labels:
        {{- include "tacticalrmm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tactical-backend

    spec:
      {{- if .Values.tactical.priorityClass.enabled }}
      priorityClassName: tactical-backend
      {{- end }}

      initContainers:
        - name: wait-for-dependencies
          image: "{{ .Values.tactical.initImage.registry }}/{{ .Values.tactical.initImage.repository }}:{{ .Values.tactical.initImage.tag }}"
          envFrom:
            {{- include "tacticalrmm.baseEnvFrom" . | nindent 12 }}
          command: ['sh', '-c', '
            echo "Waiting for PostgreSQL..." &&
            until nc -z $POSTGRES_HOST $POSTGRES_PORT; do sleep 2; done &&
            echo "PostgreSQL is ready!" &&
            echo "Waiting for Redis..." &&
            until nc -z $REDIS_HOST $REDIS_PORT; do sleep 2; done &&
            echo "Redis is ready!"
            {{- if (index .Values "tactical-nginx").enabled }} &&
            echo "Waiting for Nginx..." &&
            until nc -z tactical-nginx-0.tactical-nginx.{{ .Release.Namespace }}.svc.cluster.local 80; do sleep 2; done &&
            echo "Nginx is ready!"
            {{- end }}
            ']

      containers:
        - name: tactical-backend
          image: "{{ .Values.tactical.image.registry }}/{{ .Values.tactical.image.repository }}:{{ .Values.tactical.image.tag }}"
          args: ["tactical-backend"]
          ports:
            - containerPort: 8000
              name: http

          envFrom:
            {{- include "tacticalrmm.baseEnvFrom" . | nindent 12 }}
          env:
            {{- include "tacticalrmm.secretKeyEnv" . | nindent 12 }}

          resources:
            {{- toYaml .Values.tactical.backend.resources | nindent 12 }}

          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: backend-data
              mountPath: /opt/tactical
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: tactical-backend
{{- end }}
